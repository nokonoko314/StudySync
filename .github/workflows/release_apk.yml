name: Build & Release Android APK

# 使い方：
#   git tag v1.0.0
#   git push origin v1.0.0
# とすると、自動でAndroidのapkがビルドされ、GitHub Releasesに
# 添付されます。GitHub Pages（docs/index.html）のダウンロードボタンは
# 「最新のリリース」を自動的に指すURLになっているので、特に手動更新は不要です。

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Javaをセットアップ
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Flutterをセットアップ
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: 依存パッケージを取得
        run: flutter pub get

      - name: Android向けリリースAPKをビルド
        run: flutter build apk --release

      - name: GitHub Releaseを作成してapkを添付
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true
